<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Uống Thuốc Hiện Đại</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #0f172a; /* Nền xanh đen sâu */
            color: #f8fafc; 
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .widget-container {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid #334155;
        }

        h2 { 
            text-align: center; 
            margin-bottom: 24px; 
            font-size: 20px; 
            color: #38bdf8;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Từng dòng (ngày) là một Card */
        .day-card {
            display: grid;
            grid-template-columns: 40px 1fr 1fr;
            align-items: center;
            background: #1e293b;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .day-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border-color: #38bdf844;
        }

        .day-name { 
            color: #7dd3fc; 
            font-weight: 800; 
            font-size: 15px; 
        }

        /* Cột Sáng/Chiều */
        .time-slot {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .time-icon { font-size: 16px; }
        .sun { color: #fcd34d; text-shadow: 0 0 8px rgba(252, 211, 77, 0.4); }
        .moon { color: #818cf8; text-shadow: 0 0 8px rgba(129, 140, 248, 0.4); }

        /* Ô nhập thời gian bóng bẩy */
        input[type="time"] {
            background-color: #0f172a;
            border: 1px solid #475569;
            color: #f1f5f9;
            border-radius: 8px;
            padding: 6px 8px;
            font-family: 'SF Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            width: 76px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        input[type="time"]:focus, input[type="time"]:hover { 
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }
        
        input[type="time"]::-webkit-calendar-picker-indicator {
            display: none; /* Ẩn hẳn icon đồng hồ dư thừa để form nhìn tối giản */
        }
        input[type="time"]::-webkit-datetime-edit-ampm-field { display: none; } /* Ẩn AM/PM */

        /* Đèn LED báo trạng thái */
        .led-indicator {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .s0 { /* Chưa uống */
            background: #334155; 
            border: 2px solid #475569; 
        } 
        .s1 { /* Đã uống (Xanh phát sáng) */
            background: #10b981; 
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.6), inset 0 0 4px rgba(255,255,255,0.4); 
            border: 1px solid #059669;
        } 
        .s2 { /* Quên (Đỏ phát sáng) */
            background: #ef4444; 
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.6), inset 0 0 4px rgba(255,255,255,0.4); 
            border: 1px solid #dc2626;
        }

        /* Header cho Sáng / Chiều */
        .header-row {
            display: grid;
            grid-template-columns: 40px 1fr 1fr;
            padding: 0 16px 12px 16px;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            text-align: center;
            border-bottom: 1px solid #334155;
            margin-bottom: 12px;
        }
        .header-row > div:first-child { text-align: left; }

        /* Nút gửi */
        .save-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: linear-gradient(135deg, #0ea5e9, #38bdf8);
            color: #0f172a;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .save-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(56,189,248,0.35); }
        .save-btn:active { transform: translateY(0); }
        .save-btn.sending { background: #334155; color: #94a3b8; cursor: not-allowed; }

        /* Ô giờ có thay đổi chưa gửi */
        input[type="time"].dirty { border-color: #fbbf24; }
        
    </style>
</head>
<body>

    <div class="widget-container">
        <h2>💊 Lịch Uống Thuốc Thông Minh</h2>
        
        <div class="header-row">
            <div>Thứ</div>
            <div>☀️ Buổi Sáng</div>
            <div>🌙 Buổi Chiều</div>
        </div>

        <div class="schedule-list" id="scheduleList"></div>
        <button class="save-btn" id="saveBtn" onclick="sendAll()">💾 Lưu & Gửi Lịch Lên ERa</button>
    </div>

    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const DAYS = ['T2','T3','T4','T5','T6','T7','CN'];

        // data[i]: mMin/eMin = phút (0-1439), mSt/eSt = 0(chưa) 1(uống) 2(quên)
        let data = Array(7).fill(0).map(() => ({ mMin: 480, eMin: 1080, mSt: 0, eSt: 0 }));
        let cfg = {}, acts = [];

        const toTime = m => `${String(Math.floor(m / 60)).padStart(2, '0')}:${String(m % 60).padStart(2, '0')}`;
        const toMin  = t => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };

        const eraWidget = new EraWidget();
        eraWidget.init({
            needRealtimeConfigs: true,
            needActions: true,
            maxRealtimeConfigsCount: 7,   // 1 config/ngày → ESP32 gửi status
            maxActionsCount: 14,          // 2 action/ngày: [i*2]=sáng, [i*2+1]=chiều
            minRealtimeConfigsCount: 0,
            minActionsCount: 0,
            onConfiguration: c => { cfg = c; acts = c.actions || []; },
            onValues: values => {
                // ESP32 gửi: value = mSt + eSt*3
                (cfg.realtime_configs || []).forEach((c, i) => {
                    if (c && values[c.id] != null) {
                        const v = +values[c.id].value || 0;
                        data[i].mSt = v % 3;
                        data[i].eSt = Math.floor(v / 3) % 3;
                    }
                });
                render();
            }
        });

        function render() {
            document.getElementById('scheduleList').innerHTML = DAYS.map((day, i) => {
                const d = data[i];
                return `
                <div class="day-card">
                    <div class="day-name">${day}</div>
                    
                    <div class="time-slot">
                        <input type="time" value="${toTime(d.mMin)}" onchange="setTime(${i},'m',this.value,this)" title="Chỉnh giờ Sáng">
                        <div class="led-indicator s${d.mSt}" title="Trạng thái: ${d.mSt===0?'Chưa uống':d.mSt===1?'Đã uống':'Quên'}"></div>
                    </div>
                    
                    <div class="time-slot">
                        <input type="time" value="${toTime(d.eMin)}" onchange="setTime(${i},'e',this.value,this)" title="Chỉnh giờ Chiều">
                        <div class="led-indicator s${d.eSt}" title="Trạng thái: ${d.eSt===0?'Chưa uống':d.eSt===1?'Đã uống':'Quên'}"></div>
                    </div>
                </div>`;
            }).join('');
        }

        // Chỉ lưu local, đánh dấu dirty — không gửi ngay
        function setTime(i, p, v, el) {
            data[i][p === 'm' ? 'mMin' : 'eMin'] = toMin(v);
            if (el) el.classList.add('dirty');
        }

        // Nút Lưu: gửi đồng loạt tất cả 14 actions
        function sendAll() {
            const btn = document.getElementById('saveBtn');
            if (btn.classList.contains('sending')) return;
            btn.classList.add('sending');
            btn.textContent = '⏳ Đang gửi...';

            let idx = 0;
            function sendNext() {
                if (idx >= 14) {
                    // Xong hết — reset UI
                    btn.classList.remove('sending');
                    btn.textContent = '✅ Đã lưu!';
                    document.querySelectorAll('input.dirty').forEach(el => el.classList.remove('dirty'));
                    setTimeout(() => btn.textContent = '💾 Lưu & Gửi Lịch Lên ERa', 2000);
                    return;
                }
                const i = Math.floor(idx / 2);
                const isMorning = idx % 2 === 0;
                const min = data[i][isMorning ? 'mMin' : 'eMin'];
                if (acts[idx]) {
                    eraWidget.triggerAction(acts[idx].action, min);
                }
                idx++;
                setTimeout(sendNext, 150); // delay 150ms giữa mỗi action tránh spam
            }
            sendNext();
        }

        render();
        eraWidget.ready();
    </script>
</body>
</html>
